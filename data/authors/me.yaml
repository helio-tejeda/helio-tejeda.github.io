bio: | # I am a cognitive science researcher and Ph.D. Candidate at the University of California, Irvine.
  I am a Ph.D. Candidate at the University of California, Irvine.
  I explore how humans and artificial intelligence (AI) work together to make better decisions.
  My research focuses on human-AI interaction, AI-assisted decision-making, and the role of confidence in shaping how people trust AI.

